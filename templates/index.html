{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>FAQ Chatbot</title>

    <!-- FIXED STATIC PATH -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<!-- FIX: forces CSRF cookie generation -->
<form style="display:none;">
    {% csrf_token %}
</form>

<div class="chat-container">

    <div class="chat-header">
        FAQ Chatbot
    </div>

    <div id="chat-box"></div>

    <div class="input-area">

        <input type="text" id="user-input" placeholder="Ask your question...">

        <button onclick="sendMessage()">Send</button>

    </div>

</div>

<script>

async function sendMessage() {

    const inputField = document.getElementById('user-input');
    const message = inputField.value;

    if (message.trim() === '') return;

    const chatBox = document.getElementById('chat-box');

    chatBox.innerHTML += `
        <div class="user-message">${message}</div>
    `;

    inputField.value = '';

    try {

        const response = await fetch('/chat/', {
            method: 'POST',
            credentials: 'same-origin',   // IMPORTANT FIX
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="bot-message">${data.response}</div>
        `;

    } catch (error) {

        chatBox.innerHTML += `
            <div class="bot-message">Server Error!</div>
        `;

        console.log(error);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter key support
document.getElementById("user-input")
.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

// CSRF helper
function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();

            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

</script>

</body>
</html>
